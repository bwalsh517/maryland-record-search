name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # No `npm install` step - this project has zero runtime
      # dependencies, so there's nothing to install to run the tests.
      # Node's built-in test runner is used directly, same as running
      # it locally.
      - run: node --test test/core/*.test.js test/series/*.test.js
