name: Deploy Pages

on:
  push:
    branches: [main]
    tags: [deploy]
  delete:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'delete' || (github.event.ref_type == 'tag' && github.event.ref == 'deploy')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve which commit to deploy
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/tags/deploy" ]]; then
            # deploy tag was pushed/moved directly - deploy what it points to
            TARGET=$(git rev-parse refs/tags/deploy)
            echo "Deploying from deploy tag ($TARGET)"
            echo "via=deploy" >> "$GITHUB_OUTPUT"
          else
            # main was pushed, or the deploy tag was just deleted by
            # hand - main always wins either way. Any leftover deploy
            # tag is cleared too, so a stray tag can't linger and
            # silently override a later main push.
            TARGET=$(git rev-parse origin/main)
            if git ls-remote --exit-code --tags origin refs/tags/deploy >/dev/null 2>&1; then
              git push origin :refs/tags/deploy
              echo "Deleted deploy tag - main takes over"
            fi
            echo "Deploying from main ($TARGET)"
            echo "via=main" >> "$GITHUB_OUTPUT"
          fi
          git checkout "$TARGET"

      - name: Stamp version with git describe
        run: |
          # git describe against real vX.Y.Z tags reflects actual
          # drift since the last release. --exclude=deploy is required
          # - deploy points at exactly this commit by definition when
          # it's the trigger, so without excluding it, git describe
          # finds it first instead of the real release tag.
          #
          # When deployed via the deploy tag, the +deploy marker is
          # inserted so it's visually distinct from an ordinary main
          # deploy at a glance: v1.1.2+deploy-2-abc123 (deploy tag,
          # 2 commits past the release) vs. v1.1.2-4-gabc123 (main,
          # 4 commits past the release).
          DESCRIBED=$(git describe --tags --exclude='deploy')

          if [[ "${{ steps.resolve.outputs.via }}" == "deploy" ]]; then
            if [[ "$DESCRIBED" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([0-9a-f]+)$ ]]; then
              STAMPED="${BASH_REMATCH[1]}+deploy-${BASH_REMATCH[2]}-${BASH_REMATCH[3]}"
            else
              STAMPED="${DESCRIBED}+deploy"
            fi
          else
            STAMPED="$DESCRIBED"
          fi

          sed -i "s/global.MDRecordSearch.VERSION = \".*\";/global.MDRecordSearch.VERSION = \"${STAMPED}\";/" src/core/namespace.js
          echo "Stamped version: ${STAMPED}"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
